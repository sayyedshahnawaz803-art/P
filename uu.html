<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibad-Ur-Rahman | Islamic Search</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #002b1a; /* Dark Green */
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header Section */
        .header {
            background-color: #003322;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #c9a227;
        }

        .header h1 {
            color: #c9a227;
            font-size: 28px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        /* Search Bar Styling */
        .search-container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            background: white;
            border-radius: 30px;
            padding: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        input[type="text"] {
            flex: 1;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            outline: none;
            font-size: 16px;
        }

        button {
            background: #c9a227;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Results Area */
        .results-frame {
            flex: 1;
            width: 100%;
            background: #f1f1f1;
            border: none;
        }

        .placeholder-text {
            color: #ccc;
            text-align: center;
            margin-top: 100px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>IBAD-UR-RAHMAN</h1>
        
        <div class="search-container">
            <input type="text" id="query" placeholder="Islamic maloomat search karein...">
            <button onclick="startSearch()">Search</button>
        </div>
    </div>

    <div id="displayArea" style="flex:1; display: flex; flex-direction: column;">
        <iframe id="googleFrame" class="results-frame" src="about:blank"></iframe>
    </div>

    <script>
        function startSearch() {
            var q = document.getElementById('query').value;
            if(q.trim() !== "") {
                // Ye link Google ko "Islamic" context ke saath open karega
                var searchUrl = "https://www.google.com/search?q=" + encodeURIComponent(q) + " Islamic&igu=1";
                
                // Iframe mein load karna
                document.getElementById('googleFrame').src = searchUrl;
            } else {
                alert("Kuch likhiye...");
            }
        }
        
        // Enter key se bhi search chale
        document.getElementById("query").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                startSearch();
            }
        });
    </script>

</body>
</html>
